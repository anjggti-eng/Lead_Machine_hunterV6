<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead Machine - {{ city | capitalize }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4f46e5;
            --dark: #0f172a;
        }

        body {
            font-family: 'Outfit';
            background: var(--dark);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 3rem;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1 style="color:var(--primary); font-size: 2.5rem; margin-top:0;">Oportunidade em {{ city | capitalize }}</h1>
        <p style="color:rgba(255,255,255,0.6); margin-bottom: 2rem;">Preencha os dados abaixo e entraremos em contato o
            mais breve possível.</p>

        <form method="POST">
            <input type="text" name="name" placeholder="Seu nome completo" required>
            <input type="email" name="email" placeholder="Seu melhor e-mail" required>
            <input type="text" name="whatsapp" placeholder="WhatsApp (DDD + Número)" required>
            <button type="submit">SOLICITAR AGORA <i class="fa-solid fa-arrow-right"></i></button>
        </form>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        {% for message in messages %}
        <p style="margin-top:2rem; color:#22c55e;">{{ message }}</p>
        {% endfor %}
        {% endif %}
        {% endwith %}
    </div>
</body>

</html>
